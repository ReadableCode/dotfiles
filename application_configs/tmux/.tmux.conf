# Goal: tmux that behaves like a normal terminal — native scrollback, native
# selection/copy/paste, no custom keybindings — but survives disconnects and
# lets multiple devices attach to the same session at once.

# Mouse is ON so that LEFT-CLICK on a pane switches to it. The bindings below
# fix the two usual mouse-on annoyances: wheel scroll cycling shell history,
# and copies landing in tmux's buffer instead of the system clipboard.
# Trade-off vs mouse off: scrollback is per-pane through tmux, not the
# terminal's native buffer. To get the old behavior back: set -g mouse off
set -g mouse on

# SCROLL WHEEL UP: always scroll the pane's output history — never translate
# to Up-arrow keypresses (which walks shell history at a prompt). If the app
# in the pane grabbed the mouse itself (vim, htop), pass the scroll through.
# copy-mode -e means SCROLLING BACK DOWN to the bottom auto-exits back to the
# live prompt — no key needed to leave.
bind -n WheelUpPane if -F '#{mouse_any_flag}' 'send -M' 'copy-mode -e; send -M'

# LEFT-CLICK + DRAG anywhere — including over full-screen apps that grab the
# mouse (claude, vim, htop) — ALWAYS starts a tmux text selection. Apps never
# receive drag events; they still get plain clicks and the scroll wheel.
bind -n MouseDrag1Pane copy-mode -M

# ...then RELEASE THE BUTTON: the selection is piped straight to the system
# clipboard and copy-mode exits immediately. No prefix, no Enter, no tmux
# paste-buffer step — just paste (Cmd+V / Ctrl+V) after.
%if "${WINDIR}"
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel clip.exe
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel clip.exe
%else
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel pbcopy
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel pbcopy
%endif

# Don't switch the terminal into its alternate screen. This lets tmux's output
# land in your terminal's real scrollback, so scrolling up works like normal.
set -ga terminal-overrides ',*:smcup@:rmcup@'

# Low escape-time: less ESC lag, and it shrinks the window where stray terminal
# replies (the "10;1c" Device Attributes garbage on SSH attach from Windows)
# can leak in as keystrokes.
set -sg escape-time 10

# On Windows (MSYS2) every tmux window should be PowerShell. WINDIR only
# exists on Windows (COMSPEC/OS get stripped by MSYS2 bash, MSYSTEM is absent
# over ssh - WINDIR survives every launch path), and %if evaluates at parse
# time - unlike if-shell, which is async and can lose the race against the
# first window at server start.
# default-shell must ALSO be forced: SSH sessions inherit SHELL=cmd.exe
# (Win32-OpenSSH sets it to its spawn shell), tmux trusts $SHELL, and windows
# spawn `<default-shell> -c <default-command>` - cmd.exe doesn't understand
# -c and just opens interactively, which is how windows end up as bare cmd.
%if "${WINDIR}"
set -g default-shell /usr/bin/bash
set -g default-command 'powershell.exe -NoLogo'
%endif

# Multi-device attach is on by default — `tmux attach -t <name>` from a second
# device just works. Size the window to the most recently active client instead
# of shrinking to the smallest, so monitoring from a small screen doesn't
# squeeze your main one.
set -g window-size latest

