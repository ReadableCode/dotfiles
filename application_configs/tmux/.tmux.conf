# Goal: tmux that behaves like a normal terminal — native scrollback, native
# selection/copy/paste, no custom keybindings — but survives disconnects and
# lets multiple devices attach to the same session at once.

# Keep the mouse OUT of it. With mouse on, scrolling enters tmux copy-mode and
# uses tmux's own buffer instead of your terminal's scrollback. Off = your
# terminal handles scroll, selection, and copy/paste exactly as normal.
set -g mouse off

# Don't switch the terminal into its alternate screen. This lets tmux's output
# land in your terminal's real scrollback, so scrolling up works like normal.
set -ga terminal-overrides ',*:smcup@:rmcup@'

# Low escape-time: less ESC lag, and it shrinks the window where stray terminal
# replies (the "10;1c" Device Attributes garbage on SSH attach from Windows)
# can leak in as keystrokes.
set -sg escape-time 10

# On Windows tmux runs under MSYS2, but the shell wanted in every window is
# PowerShell, not MSYS2 bash. uname -o prints "Msys" only there; on Linux it
# prints GNU/Linux and on macOS it errors, so this line is a no-op elsewhere.
if-shell 'test "$(uname -o 2>/dev/null)" = Msys' \
  "set -g default-command 'powershell.exe -NoLogo'"

# Multi-device attach is on by default — `tmux attach -t <name>` from a second
# device just works. Size the window to the most recently active client instead
# of shrinking to the smallest, so monitoring from a small screen doesn't
# squeeze your main one.
set -g window-size latest

# --- Plugins (currently inactive) ---------------------------------------------
# These never load: tpm isn't installed (~/.tmux/plugins/tpm is missing), so
# tmux-sensible and the dracula status bar do nothing. Left commented because a
# big status bar is the opposite of "like a normal terminal." To enable, install
# tpm first:  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dracula/tmux'
# set -g @dracula-plugins "cpu-usage ram-usage git"
# run '~/.tmux/plugins/tpm/tpm'
