# Deploy manifest — single source of truth for which repo configs are deployed
# where on each machine. Consumed by `src/deploy_configs.py`:
#
#   uv run python src/deploy_configs.py             # deploy for this machine
#   uv run python src/deploy_configs.py status      # read-only drift report +
#                                                   # planned actions (cron-able)
#
# Entry schema:
#   - name: unique identifier
#     repo: path relative to the repo root. Resolved against <base>.<token>.<ext>
#           variant files (lowercase token): exact hostname first, then platform
#           (darwin/mac, linux, windows), then the bare default. Hosts with no
#           matching variant and no bare file are skipped, so new host variants
#           need no manifest change. Context tags (settings.hf.json) are never
#           auto-resolved.
#     dest:                       # per-platform destination (omit a platform to skip it)
#       darwin: ~/path            # {host} expands to the lowercase short hostname,
#       linux: ~/path             # {repo_parent} to the directory containing this
#       windows: ~/path           # repo checkout (e.g. ~/GitHub)
#     hosts: [ENVY, ELITEDESK]    # optional: limit to specific hostnames (uppercase,
#                                 # matched against the short hostname). Every name
#                                 # must exist in personal_credentials/hosts.json -
#                                 # validated at load (skipped if that repo is absent).
#     method: symlink | none      # default symlink. "none" = inventory-only entry:
#                                 # the app is configured without links (see note).
#                                 # There is no copy method - copies silently drift.
#     requires: ~/path            # optional precondition: skip the entry (SKIP_REQUIRES)
#                                 # unless this path (or, given a list of paths, ALL of
#                                 # them) already exists. Placeholders expand like dest.
#                                 # Set it when dest lives inside a sibling repo checkout
#                                 # so deploy never creates a repo's folder on a machine
#                                 # that hasn't cloned it (which would break a later git
#                                 # clone); list both the dest repo and the credentials
#                                 # source repo so the entry follows the clones instead
#                                 # of a hosts whitelist. Configs that OWN their dest dir
#                                 # (~/.config/nvim, ~/.claude, ...) must NOT set it -
#                                 # creating those dirs is wanted.
#     note: free text caveat
#
# Entries with `method: none` document apps that intentionally do NOT use links,
# so this file is a complete inventory of deployed configs, not just a link list.

# --- Shells ---

- name: zshrc
  repo: application_configs/bash/.zshrc
  dest:
    darwin: ~/.zshrc

- name: bashrc
  repo: application_configs/bash/.bashrc
  dest:
    linux: ~/.bashrc
  note: "Also used on Android/Termux (platform.system() reports Linux there)."

- name: bash_aliases
  repo: application_configs/bash/.bash_aliases
  dest:
    linux: ~/.bash_aliases

- name: shared_aliases
  repo: application_configs/bash/.shared_aliases
  dest:
    darwin: ~/.shared_aliases
    linux: ~/.shared_aliases
  note: ".zshrc and .bash_aliases also auto-symlink this on first run if missing."

# --- Terminal / multiplexer ---

- name: tmux_conf
  repo: application_configs/tmux/.tmux.conf
  dest:
    darwin: ~/.tmux.conf
    linux: ~/.tmux.conf
    windows: ~/.tmux.conf
  note: >-
    On Windows tmux runs under MSYS2, whose HOME resolves to the Windows
    profile, so ~/.tmux.conf is correct there too.

# --- Editors ---

- name: nvim_init
  repo: application_configs/nvim/init.lua
  dest:
    darwin: ~/.config/nvim/init.lua
    linux: ~/.config/nvim/init.lua
  note: "Windows deliberately has no dest here - see nvim_init_windows."

- name: nvim_init_windows
  repo: application_configs/nvim/init.lua
  method: none
  note: >-
    nvim on Windows uses XDG_CONFIG_HOME (set in
    application_configs/powershell/powershell_aliases.ps1) to point straight at
    the repo's application_configs folder - no link or copy needed, and nothing
    breaks when git pull runs. See docs/setup_neovim.md.

- name: vscode_settings
  repo: application_configs/vscode/settings.json
  dest:
    darwin: ~/Library/Application Support/Code/User/settings.json
    linux: ~/.config/Code/User/settings.json
    windows: ~/AppData/Roaming/Code/User/settings.json
  note: "On macOS the deployer resolves the settings.mac.json platform variant."

- name: vscode_workspace
  repo: application_configs/vscode/workspace.code-workspace
  dest:
    darwin: "{repo_parent}/{host}.code-workspace"
    linux: "{repo_parent}/{host}.code-workspace"
    windows: "{repo_parent}/{host}.code-workspace"
  note: >-
    Resolves to workspace.<host>.code-workspace (there is no bare default -
    hosts without a variant are skipped). The link lives next to the repo
    checkout (~/GitHub, or ~/HelloFreshProjects on the HelloFresh laptop)
    because the workspace's project folders are relative siblings of dotfiles/.
    Renamed from <host>.code-workspace - redeploy on each machine to fix the
    old dangling links. New host: add the variant file, no manifest change
    needed. See docs/setup_vscode.md.

- name: zed_settings
  repo: application_configs/zed/settings.json
  dest:
    darwin: ~/.config/zed/settings.json

# --- Git ---

- name: git_ignore
  repo: application_configs/git/ignore
  dest:
    darwin: ~/.config/git/ignore
    linux: ~/.config/git/ignore
  note: >-
    ~/.config/git/ignore is git's default global ignore path (no gitconfig entry
    needed). Candidate for config-path indirection instead of a link:
    git config --global core.excludesFile <repo path>.

# --- Claude ---

- name: claude_settings
  repo: application_configs/claude/settings.json
  dest:
    darwin: ~/.claude/settings.json
    linux: ~/.claude/settings.json
    windows: ~/.claude/settings.json
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5,
          ULTRAPOCKET, RYZENWHITE, SPECTRE, YOGA7I, JASONZEPHYRUS]
  note: >-
    Personal machines only, named exactly as in personal_credentials/hosts.json (validated at
    load). ~/.claude/settings.json is the correct location on Windows too
    (%USERPROFILE%\.claude\settings.json). Work-context hosts (HELLOFRESHJASON,
    FFLAP-2229, HELLOFRESHWINDOWS, FF-TN-ENGINEER-01) are deliberately
    excluded so this entry never overwrites a by-hand context-variant link -
    see claude_settings_hf.

- name: claude_settings_hf
  repo: application_configs/claude/settings.hf.json
  dest:
    linux: ~/.claude/settings.json
    windows: ~/.claude/settings.json
  hosts: [HELLOFRESHJASON, HELLOFRESHWINDOWS]
  note: >-
    HelloFresh work context. Context tags are never auto-resolved, so this
    host-filtered entry deploys the wanted variant explicitly: currently the
    non-Bedrock settings.hf.json - point repo at settings.hf_bedrock.json
    here when switching back to Bedrock. No collision with claude_settings:
    its hosts whitelist excludes the work machines.

# Claude permission allow lists are personal and must NEVER be committed to a
# project repo (cloners should not inherit them) or to this public repo. One
# combined permissive list (personal_credentials/claude/project_settings/
# personal_repos.settings.local.json) is symlinked into every personal repo as
# .claude/settings.local.json, which stays gitignored everywhere (global git
# ignore). Approvals made in a session write through the link, so they sync
# via the credentials repo. Repo-destined entries set requires so a machine
# that never cloned that repo skips the link instead of creating the folder.
# Hosts: personal machines known to have personal_credentials checked out
# next to dotfiles.

- name: claude_allow_github_folder
  repo: ../personal_credentials/claude/project_settings/personal_repos.settings.local.json
  dest:
    darwin: "{repo_parent}/.claude/settings.local.json"
    linux: "{repo_parent}/.claude/settings.local.json"
    windows: "{repo_parent}/.claude/settings.local.json"
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5, ULTRAPOCKET]
  note: >-
    Folder-scoped permissions for the repos parent dir (~/GitHub or
    equivalent); covers repos with no entry of their own. No requires:
    the parent dir always exists (dotfiles lives in it).

- name: claude_allow_dotfiles
  repo: ../personal_credentials/claude/project_settings/personal_repos.settings.local.json
  dest:
    darwin: "{repo_parent}/dotfiles/.claude/settings.local.json"
    linux: "{repo_parent}/dotfiles/.claude/settings.local.json"
    windows: "{repo_parent}/dotfiles/.claude/settings.local.json"
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5, ULTRAPOCKET]
  note: >-
    No requires: deploy runs from this repo, so it is always present. An allow
    list was mistakenly git-tracked here until 2026-07; never re-add one.

- name: claude_allow_load_log
  repo: ../personal_credentials/claude/project_settings/personal_repos.settings.local.json
  dest:
    darwin: "{repo_parent}/load-log/.claude/settings.local.json"
    linux: "{repo_parent}/load-log/.claude/settings.local.json"
    windows: "{repo_parent}/load-log/.claude/settings.local.json"
  requires: "{repo_parent}/load-log"
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5, ULTRAPOCKET]

- name: claude_allow_packing_list
  repo: ../personal_credentials/claude/project_settings/personal_repos.settings.local.json
  dest:
    darwin: "{repo_parent}/Packing-List/.claude/settings.local.json"
    linux: "{repo_parent}/Packing-List/.claude/settings.local.json"
    windows: "{repo_parent}/Packing-List/.claude/settings.local.json"
  requires: "{repo_parent}/Packing-List"
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5, ULTRAPOCKET]

- name: claude_allow_herdstone
  repo: ../personal_credentials/claude/project_settings/personal_repos.settings.local.json
  dest:
    darwin: "{repo_parent}/herdstone/.claude/settings.local.json"
    linux: "{repo_parent}/herdstone/.claude/settings.local.json"
    windows: "{repo_parent}/herdstone/.claude/settings.local.json"
  requires: "{repo_parent}/herdstone"
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5, ULTRAPOCKET]

- name: claude_skill_pr_review
  repo: ../personal_credentials/claude/skills/pr-review/SKILL.md
  dest:
    darwin: ~/.claude/skills/pr-review/SKILL.md
    linux: ~/.claude/skills/pr-review/SKILL.md
    windows: ~/.claude/skills/pr-review/SKILL.md
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5, ULTRAPOCKET]
  note: >-
    Personal PR-review skill. Lives in personal_credentials (NOT dotfiles -
    dotfiles is public and this file encodes private review preferences), so
    it can only deploy to hosts with that repo checked out. Add a host here
    once personal_credentials exists there.

# --- Claude: fourteen_foods project links (sources in personal_credentials) ---
# No hosts filter: these follow the clones. Any machine with BOTH
# fourteen_foods and personal_credentials checked out (see requires) gets the
# links; everything else skips with SKIP_REQUIRES.

- name: fourteen_foods_mcp
  repo: ../personal_credentials/fourteen_foods_mcp.json
  dest:
    darwin: "{repo_parent}/fourteen_foods/.mcp.json"
    linux: "{repo_parent}/fourteen_foods/.mcp.json"
    windows: "{repo_parent}/fourteen_foods/.mcp.json"
  requires:
    - "{repo_parent}/fourteen_foods"
    - "{repo_parent}/personal_credentials"
  note: >-
    MCP server def WITH a live API token - never move into dotfiles.
    Gitignored in the project repo via its /*.json rule.

- name: fourteen_foods_claude_settings
  repo: ../personal_credentials/fourteen_foods_claude_settings.json
  dest:
    darwin: "{repo_parent}/fourteen_foods/.claude/settings.local.json"
    linux: "{repo_parent}/fourteen_foods/.claude/settings.local.json"
    windows: "{repo_parent}/fourteen_foods/.claude/settings.local.json"
  requires:
    - "{repo_parent}/fourteen_foods"
    - "{repo_parent}/personal_credentials"
  note: "Formalizes the by-hand symlink created 2025-06; no secrets, just permissions."

- name: fourteen_foods_claude_md
  repo: ../personal_credentials/fourteen_foods_CLAUDE.md
  dest:
    darwin: "{repo_parent}/fourteen_foods/CLAUDE.md"
    linux: "{repo_parent}/fourteen_foods/CLAUDE.md"
    windows: "{repo_parent}/fourteen_foods/CLAUDE.md"
  requires:
    - "{repo_parent}/fourteen_foods"
    - "{repo_parent}/personal_credentials"
  note: >-
    Repo guidance containing internal client hostnames/IPs, so it is
    deliberately gitignored in the project repo and versioned in
    personal_credentials instead.

- name: fourteen_foods_claude_command_ticket_pr
  repo: ../personal_credentials/fourteen_foods_create_ticket_and_pr.md
  dest:
    darwin: "{repo_parent}/fourteen_foods/.claude/commands/create_ticket_and_pr.md"
    linux: "{repo_parent}/fourteen_foods/.claude/commands/create_ticket_and_pr.md"
    windows: "{repo_parent}/fourteen_foods/.claude/commands/create_ticket_and_pr.md"
  requires:
    - "{repo_parent}/fourteen_foods"
    - "{repo_parent}/personal_credentials"
  note: >-
    Personal Claude command (/create_ticket_and_pr in that repo); the project
    repo gitignores .claude/commands/ expecting this symlink-from-credentials
    arrangement, mirroring na_finops_claude_command_ticket_pr.

