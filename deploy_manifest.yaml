# Deploy manifest — single source of truth for which repo configs are deployed
# where on each machine. Consumed by `src/deploy_configs.py`:
#
#   uv run python src/deploy_configs.py             # deploy for this machine
#   uv run python src/deploy_configs.py status      # read-only drift report +
#                                                   # planned actions (cron-able)
#
# Entry schema:
#   - name: unique identifier
#     repo: path relative to the repo root. Resolved against <base>.<token>.<ext>
#           variant files (lowercase token): exact hostname first, then platform
#           (darwin/mac, linux, windows), then the bare default. Hosts with no
#           matching variant and no bare file are skipped, so new host variants
#           need no manifest change. Context tags (settings.hf.json) are never
#           auto-resolved.
#     dest:                       # per-platform destination (omit a platform to skip it)
#       darwin: ~/path            # {host} expands to the lowercase short hostname,
#       linux: ~/path             # {repo_parent} to the directory containing this
#       windows: ~/path           # repo checkout (e.g. ~/GitHub)
#     hosts: [ENVY, ELITEDESK]    # optional: limit to specific hostnames (uppercase,
#                                 # matched against the short hostname). Every name
#                                 # must exist in inventory/hosts - validated at load.
#     method: symlink | none      # default symlink. "none" = inventory-only entry:
#                                 # the app is configured without links (see note).
#                                 # There is no copy method - copies silently drift.
#     note: free text caveat
#
# Entries with `method: none` document apps that intentionally do NOT use links,
# so this file is a complete inventory of deployed configs, not just a link list.

# --- Shells ---

- name: zshrc
  repo: application_configs/bash/.zshrc
  dest:
    darwin: ~/.zshrc

- name: bashrc
  repo: application_configs/bash/.bashrc
  dest:
    linux: ~/.bashrc
  note: "Also used on Android/Termux (platform.system() reports Linux there)."

- name: bash_aliases
  repo: application_configs/bash/.bash_aliases
  dest:
    linux: ~/.bash_aliases

- name: shared_aliases
  repo: application_configs/bash/.shared_aliases
  dest:
    darwin: ~/.shared_aliases
    linux: ~/.shared_aliases
  note: ".zshrc and .bash_aliases also auto-symlink this on first run if missing."

# --- Terminal / multiplexer ---

- name: tmux_conf
  repo: application_configs/tmux/.tmux.conf
  dest:
    darwin: ~/.tmux.conf
    linux: ~/.tmux.conf

# --- Editors ---

- name: nvim_init
  repo: application_configs/nvim/init.lua
  dest:
    darwin: ~/.config/nvim/init.lua
    linux: ~/.config/nvim/init.lua
  note: "Windows deliberately has no dest here - see nvim_init_windows."

- name: nvim_init_windows
  repo: application_configs/nvim/init.lua
  method: none
  note: >-
    nvim on Windows uses XDG_CONFIG_HOME (set in
    application_configs/powershell/powershell_aliases.ps1) to point straight at
    the repo's application_configs folder - no link or copy needed, and nothing
    breaks when git pull runs. See docs/setup_neovim.md.

- name: vscode_settings
  repo: application_configs/vscode/settings.json
  dest:
    darwin: ~/Library/Application Support/Code/User/settings.json
    linux: ~/.config/Code/User/settings.json
    windows: ~/AppData/Roaming/Code/User/settings.json
  note: "On macOS the deployer resolves the settings.mac.json platform variant."

- name: vscode_workspace
  repo: application_configs/vscode/workspace.code-workspace
  dest:
    darwin: "{repo_parent}/{host}.code-workspace"
    linux: "{repo_parent}/{host}.code-workspace"
    windows: "{repo_parent}/{host}.code-workspace"
  note: >-
    Resolves to workspace.<host>.code-workspace (there is no bare default -
    hosts without a variant are skipped). The link lives next to the repo
    checkout (~/GitHub, or ~/HelloFreshProjects on the HelloFresh laptop)
    because the workspace's project folders are relative siblings of dotfiles/.
    Renamed from <host>.code-workspace - redeploy on each machine to fix the
    old dangling links. New host: add the variant file, no manifest change
    needed. See docs/setup_vscode.md.

- name: zed_settings
  repo: application_configs/zed/settings.json
  dest:
    darwin: ~/.config/zed/settings.json

# --- Git ---

- name: git_ignore
  repo: application_configs/git/ignore
  dest:
    darwin: ~/.config/git/ignore
    linux: ~/.config/git/ignore
  note: >-
    ~/.config/git/ignore is git's default global ignore path (no gitconfig entry
    needed). Candidate for config-path indirection instead of a link:
    git config --global core.excludesFile <repo path>.

# --- Claude ---

- name: claude_settings
  repo: application_configs/claude/settings.json
  dest:
    darwin: ~/.claude/settings.json
    linux: ~/.claude/settings.json
  hosts: [ENVY, ELITEDESK, MACBOOKPROM5, MACBOOKPRO12, MACMINI14, NUKBUNTU, PAVILIONI5]
  note: >-
    Personal darwin/linux machines only, named exactly as in inventory/hosts
    (validated at load). Work-context hosts (HELLOFRESHJASON,
    FOURTEENFOODSLAPTOP, HELLOFRESHWINDOWS, FF-TN-ENGINEER-01) are deliberately
    excluded so this entry never overwrites a by-hand context-variant link -
    see claude_settings_hf.

- name: claude_settings_hf
  repo: application_configs/claude/settings.hf.json
  method: none
  note: >-
    Work-context variants settings.hf.json / settings.hf_bedrock.json (hf =
    HelloFresh). Context tags are never auto-resolved - on work machines link
    or copy the wanted variant to ~/.claude/settings.json by hand. Renamed to
    the dotted variant scheme in Task 5; re-point any pre-rename link.

# --- Barrier (KVM sharing) ---

- name: barrier_configs
  repo: application_configs/barrier
  method: none
  note: >-
    Per-host barrier_config.<host>.sgc files, loaded by path from the Barrier
    GUI / autostart arguments - no links. Renamed to the dotted variant scheme
    in Task 5; re-point Barrier at the new filename on hellofreshwindows,
    jasonzephyrus, and ryzenwhite.

# --- macOS automation ---

- name: hammerspoon_init
  repo: application_configs/hammerspoon/init.lua
  dest:
    darwin: ~/.hammerspoon/init.lua
  note: "Hammerspoon follows the link and writes window_layouts.json back into the repo."

# --- Windows automation (AutoHotkey startup scripts) ---

- name: ahk_app_jumping
  repo: scripts/app_jumping.ahk
  dest:
    windows: ~/AppData/Roaming/Microsoft/Windows/Start Menu/Programs/Startup/app_jumping.ahk
  note: "Previously created by scripts/create_sym_links_startup.ps1."

- name: ahk_sheets
  repo: scripts/sheets.ahk
  dest:
    windows: ~/AppData/Roaming/Microsoft/Windows/Start Menu/Programs/Startup/sheets.ahk
  note: "Previously created by scripts/create_sym_links_startup.ps1."

# --- PowerShell ---

- name: powershell_profile
  repo: application_configs/powershell/powershell_aliases.ps1
  method: none
  note: >-
    Not linked: $PROFILE dot-sources this file (". <path>"), so the profile is
    config-path indirection rather than a link. See
    docs/setup_windows_workstation_personal.md.
